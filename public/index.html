<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"
		/>
		<title>랜덤 보디빌딩</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family:
					"Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
				background: #f0f4f1;
				display: flex;
				justify-content: center;
				align-items: flex-start;
				min-height: 100vh;
				padding: 1.2rem 1rem 2rem;
				margin: 0;
			}

			.container {
				width: 100%;
				max-width: 520px;
				background: white;
				border-radius: 2rem;
				box-shadow: 0 12px 30px rgba(0, 80, 20, 0.12);
				padding: 1.8rem 1.5rem 2rem;
				display: flex;
				flex-direction: column;
				gap: 1.6rem;
			}

			h1 {
				font-size: 1.9rem;
				font-weight: 700;
				color: #1b5e20;
				text-align: center;
				letter-spacing: -0.5px;
				margin-bottom: 0.2rem;
			}

			.remaining-badge {
				background: #e8f5e9;
				color: #2e7d32;
				padding: 0.5rem 1.2rem;
				border-radius: 3rem;
				font-weight: 600;
				font-size: 0.95rem;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.4rem;
				align-self: center;
				box-shadow: 0 2px 8px rgba(0, 100, 0, 0.1);
			}

			.count-input-area {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				flex-wrap: wrap;
			}

			.count-input-area label {
				font-weight: 600;
				color: #1b5e20;
				font-size: 1rem;
			}

			#drawCount {
				width: 4rem;
				padding: 0.55rem 0.4rem;
				border: 2px solid #a5d6a7;
				border-radius: 1rem;
				text-align: center;
				font-size: 1rem;
				font-weight: 600;
				color: #1b5e20;
				background: white;
			}

			.button-grid {
				display: flex;
				flex-direction: column;
				gap: 0.75rem;
			}

			.button-row {
				display: flex;
				flex-wrap: wrap;
				gap: 0.6rem;
				justify-content: center;
			}

			button {
				background: #e8f5e9;
				border: none;
				padding: 0.9rem 1.2rem;
				border-radius: 2rem;
				font-weight: 600;
				font-size: 0.95rem;
				color: #1b5e20;
				background: #ffffff;
				box-shadow: 0 4px 12px rgba(46, 125, 50, 0.15);
				border: 1px solid #c8e6c9;
				transition: all 0.2s ease;
				cursor: pointer;
				flex: 1 1 auto;
				min-width: 130px;
				letter-spacing: -0.3px;
				white-space: nowrap;
			}

			button:active {
				background: #c8e6c9;
				box-shadow: 0 2px 6px rgba(0, 80, 20, 0.2);
				transform: scale(0.97);
			}

			button.primary {
				background: #2e7d32;
				color: white;
				border: 1px solid #1b5e20;
				box-shadow: 0 6px 14px rgba(27, 94, 32, 0.3);
				font-weight: 700;
			}

			button.primary:active {
				background: #1b5e20;
			}

			.result-card {
				background: #f1f8e9;
				border-radius: 1.8rem;
				padding: 1.6rem 1.4rem;
				box-shadow: 0 8px 24px rgba(0, 80, 20, 0.1);
				border: 1px solid #c8e6c9;
				display: none;
				flex-direction: column;
				gap: 1rem;
			}

			.result-card.visible {
				display: flex;
			}

			.result-section {
				background: white;
				border-radius: 1.2rem;
				padding: 1rem 1.2rem;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
			}

			.result-label {
				font-size: 0.85rem;
				font-weight: 700;
				color: #2e7d32;
				margin-bottom: 0.5rem;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}

			.exercise-list {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			.exercise-list li {
				font-weight: 600;
				font-size: 1.1rem;
				color: #1b1b1b;
				background: #f5f5f5;
				padding: 0.7rem 1rem;
				border-radius: 1rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
				border-left: 5px solid #4caf50;
			}

			.set-pose-item {
				font-weight: 700;
				font-size: 1.2rem;
				color: #1b5e20;
				background: #e8f5e9;
				padding: 0.8rem 1.2rem;
				border-radius: 1rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}

			.modal-overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 30, 10, 0.6);
				backdrop-filter: blur(4px);
				-webkit-backdrop-filter: blur(4px); /* iOS 호환 */
				display: none;
				justify-content: center;
				align-items: center;
				z-index: 1000;
				padding: 1rem;
			}

			.modal {
				background: white;
				border-radius: 2rem;
				max-width: 550px;
				width: 100%;
				max-height: 85vh;
				overflow-y: auto;
				padding: 1.8rem 1.5rem;
				box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
				display: flex;
				flex-direction: column;
				gap: 1.4rem;
			}

			.modal h2 {
				color: #1b5e20;
				text-align: center;
				font-size: 1.5rem;
			}

			.edit-section {
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			.edit-section label {
				font-weight: 700;
				color: #2e7d32;
				font-size: 0.9rem;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.edit-section textarea {
				width: 100%;
				height: 120px;
				border: 2px solid #a5d6a7;
				border-radius: 1rem;
				padding: 0.8rem;
				font-size: 0.9rem;
				font-family: inherit;
				resize: vertical;
				background: #f9fdf9;
			}

			.modal-actions {
				display: flex;
				gap: 0.8rem;
				justify-content: flex-end;
				flex-wrap: wrap;
			}

			.reset-small {
				background: none;
				border: 1px solid #a5d6a7;
				color: #2e7d32;
				padding: 0.3rem 0.9rem;
				font-size: 0.8rem;
				border-radius: 1.5rem;
				font-weight: 600;
				box-shadow: none;
				min-width: auto;
			}

			@media (max-width: 400px) {
				.container {
					padding: 1.4rem 1rem;
				}

				button {
					padding: 0.8rem 1rem;
					font-size: 0.85rem;
					min-width: 100px;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>🏋️ 랜덤 보디빌딩</h1>

			<div class="remaining-badge" id="remainingDisplay">
				<span>🏋️ 남은 종목</span> <span id="remainingCount">0</span>
			</div>
			<div class="remaining-badge" id="remainingSetsDisplay">
				<span>🔄 남은 세트</span> <span id="remainingSetsCount">0</span>
			</div>

			<div class="count-input-area">
				<label for="drawCount">뽑을 개수</label>
				<input
					type="number"
					id="drawCount"
					value="3"
					min="1"
					max="60"
					step="1"
				/>
			</div>

			<div class="button-grid">
				<div class="button-row">
					<button id="btnPickOne">🎯 종목 하나 뽑기</button>
					<button id="btnPickMultiple">📋 종목 여럿 뽑기</button>
				</div>
				<div class="button-row">
					<button id="btnPickMultipleSet">📋➕세트</button>
					<button id="btnPickMultipleSetPose">📋➕세트➕포징</button>
				</div>
				<div class="button-row">
					<button id="btnReset" class="primary">🔄 초기화</button>
					<button id="btnEditList">✏️ 목록 편집</button>
				</div>
			</div>

			<!-- 결과 카드 -->
			<div id="resultCard" class="result-card">
				<!-- 동적으로 채워짐 -->
			</div>
		</div>

		<!-- 편집 모달 -->
		<div id="editModal" class="modal-overlay">
			<div class="modal">
				<h2>📝 목록 편집</h2>
				<div class="edit-section">
					<label
						>저항운동 종목
						<button class="reset-small" id="resetExercises">
							기본값 복원
						</button></label
					>
					<textarea
						id="editExercises"
						placeholder="한 줄에 하나씩 입력"
					></textarea>
				</div>
				<div class="edit-section">
					<label
						>세트 목록
						<button class="reset-small" id="resetSets">
							기본값 복원
						</button></label
					>
					<textarea id="editSets" placeholder="한 줄에 하나씩 입력"></textarea>
				</div>
				<div class="edit-section">
					<label
						>포징 모음 목록
						<button class="reset-small" id="resetPoses">
							기본값 복원
						</button></label
					>
					<textarea id="editPoses" placeholder="한 줄에 하나씩 입력"></textarea>
				</div>
				<div class="modal-actions">
					<button id="cancelEdit">취소</button>
					<button id="saveEdit" class="primary">저장</button>
				</div>
			</div>
		</div>

		<script>
			(function () {
				// ---------- 기본 데이터 (하드코딩 없이 상수로 분리) ----------
				var DEFAULT_EXERCISES = [
					"플랫 바벨 벤치 프레스",
					"인클라인 바벨 벤치프레스",
					"플랫 덤벨 벤치 프레스",
					"인클라인 덤벨 벤치 프레스",
					"플랫 덤벨 플라이",
					"플랫 덤벨 풀오버",
					"스탠딩 바벨 컬",
					"스탠딩 리버스 바벨 컬",
					"스탠딩 덤벨 컬",
					"스탠딩 얼터네이트 덤벨 컬",
					"스탠딩 덤벨 해머 컬",
					"스탠딩 얼터네이트 해머 컬",
					"컨센트레이션 덤벨 컬",
					"스탠딩 바벨 오버헤드 트라이셉스 익스텐션",
					"스탠딩 원암 덤벨 오버헤드 트라이셉스 익스텐션",
					"라잉 바벨 트라이셉스 익스텐션",
					"덤벨 킥백",
					"벤치 딥스",
					"바벨 리스트 컬",
					"바벨 리버스 리스트 컬",
					"덤벨 리스트 컬",
					"덤벨 리버스 리스트 컬",
					"컨벤셔널 데드리프트",
					"루마니안 데드리프트",
					"벤트오버 바벨 로우",
					"언더그립 바벨 로우",
					"뉴트럴그립 투암 덤벨 로우",
					"벤트오버 원암 덤벨 로우",
					"바벨 쉬러그",
					"덤벨 쉬러그",
					"바벨 굿모닝 엑서사이즈",
					"스탠딩 밀리터리 프레스 (바벨 오버헤드 프레스)",
					"스탠딩 비하인드 넥 프레스",
					"스탠딩 덤벨 숄더 프레스",
					"스탠딩 바벨 프런트 레이즈",
					"스탠딩 덤벨 프런트 레이즈",
					"덤벨 벤트오버 레터럴 레이즈",
					"바벨 업라이트 로우",
					"크런치",
					"레그 레이즈",
					"싯업",
					"시티드 니업",
					"리버스 크런치",
					"덤벨 사이드 밴드",
					"바벨 백 스쿼트",
					"바벨 프런트 스쿼트",
					"고블릿 스쿼트",
					"덤벨 불가리안 스플릿 스쿼트",
					"스티프 레그 데드리프트",
					"바벨 런지",
					"덤벨 런지",
				];

				var DEFAULT_SETS = [
					"하체 트라이세트",
					"삼두 트라이세트",
					"이두 트라이세트",
					"어깨 트라이세트",
					"등 트라이세트",
					"가슴 트라이세트",
					"전완 신전 컴파운드세트",
					"복부 트라이세트",
					"하체 컴파운드세트",
					"삼두 컴파운드세트",
					"이두 컴파운드세트",
					"어깨 컴파운드세트",
					"등 컴파운드세트",
					"가슴 컴파운드세트",
					"전완 굴곡 컴파운드세트",
					"복부 컴파운드세트",
					"이두·삼두 슈퍼세트",
				];

				var DEFAULT_POSES = [
					"보디빌딩 규정포즈 7개",
					"클래식 보디빌딩 규정포즈 7개",
					"남자 피지크 쿼터턴",
					"여자 피지크 규정포즈 4개",
					"여자 피지크 쿼터턴",
					"여자 보디피트니스",
					"여자 비키니",
				];

				// ---------- 유틸리티 함수 ----------
				var shuffleArray = function (arr) {
					for (var i = arr.length - 1; i > 0; i--) {
						var j = Math.floor(Math.random() * (i + 1));
						var temp = arr[i];
						arr[i] = arr[j];
						arr[j] = temp;
					}
					return arr;
				};

				// HTML 이스케이프 헬퍼
				var escapeHTML = function (str) {
					return String(str)
						.replace(/&/g, "&amp;")
						.replace(/</g, "&lt;")
						.replace(/>/g, "&gt;")
						.replace(/"/g, "&quot;")
						.replace(/'/g, "&#039;");
				};

				// ---------- 공통 풀(Pool) 클래스 (중복 제거) ----------
				var BasePool = function (items) {
					this.items = items ? items.slice() : [];
					this.picked = {}; // 선택된 항목을 객체 키로 관리
				};

				BasePool.prototype.resetPicked = function () {
					this.picked = {};
				};

				BasePool.prototype.setItems = function (newItems) {
					this.items = newItems.slice(); // 복사
					this.picked = {}; // 풀이 바뀌면 선택 기록도 초기화
				};

				BasePool.prototype.getRemainingCount = function () {
					return this.items.length - Object.keys(this.picked).length;
				};

				BasePool.prototype.getAvailableItems = function () {
					var self = this;
					return this.items.filter(function (item) {
						return !self.picked[item];
					});
				};

				BasePool.prototype.drawOne = function () {
					var available = this.getAvailableItems();
					if (available.length === 0) return null;
					var idx = Math.floor(Math.random() * available.length);
					var chosen = available[idx];
					this.picked[chosen] = true;
					return chosen;
				};

				// ---------- 운동 종목 풀 (BasePool 확장) ----------
				var ExercisePool = function (items) {
					BasePool.call(this, items);
				};
				ExercisePool.prototype = Object.create(BasePool.prototype);
				ExercisePool.prototype.constructor = ExercisePool;

				// 운동 전용 로깅을 포함한 drawOne 오버라이드
				ExercisePool.prototype.drawOne = function () {
					var chosen = BasePool.prototype.drawOne.call(this);
					if (chosen) {
						console.log("운동 1개 뽑음:" + chosen);
					}
					return chosen;
				};

				ExercisePool.prototype.drawMultiple = function (count) {
					var available = this.getAvailableItems();
					if (available.length === 0) return [];
					var shuffled = shuffleArray(available.slice()); // 복사해서 셔플
					var toPick = Math.min(count, shuffled.length);
					var chosen = shuffled.slice(0, toPick);
					var self = this;
					chosen.forEach(function (item) {
						self.picked[item] = true;
					});
					console.log("운동 " + toPick + "개 뽑음:" + chosen.join(", "));
					return chosen;
				};

				// ---------- 세트 풀 (BasePool 확장, 중복 뽑기 방지) ----------
				var SetPool = function (items) {
					BasePool.call(this, items);
				};
				SetPool.prototype = Object.create(BasePool.prototype);
				SetPool.prototype.constructor = SetPool;

				// 세트 전용 로깅과 함께 drawRandom 구현 (내부적으로 drawOne 사용)
				SetPool.prototype.drawRandom = function () {
					var chosen = this.drawOne(); // BasePool의 drawOne 상속
					if (chosen) {
						console.log("세트 1개 뽑음:" + chosen);
					}
					return chosen;
				};

				// ---------- 포즈 풀 (별도, 중복 추적 불필요) ----------
				var PosePool = function (items) {
					if (!items) items = [];
					this.items = items.slice();
				};

				PosePool.prototype.setItems = function (newItems) {
					this.items = newItems.slice();
					console.log("포징 풀 업데이트:" + this.items.length);
				};

				PosePool.prototype.drawRandom = function () {
					if (this.items.length === 0) return null;
					var idx = Math.floor(Math.random() * this.items.length);
					return this.items[idx];
				};

				// ---------- 메인 앱 클래스 ----------
				var RandomBodybuildingApp = function () {
					this.exercisePool = new ExercisePool(DEFAULT_EXERCISES);
					this.setPool = new SetPool(DEFAULT_SETS);
					this.posePool = new PosePool(DEFAULT_POSES);
					this.initUI();
					this.updateRemainingDisplay();
					console.log("앱 초기화 완료");
				};

				RandomBodybuildingApp.prototype.initUI = function () {
					var self = this;

					// DOM 요소 캐싱
					this.remainingSpan = document.getElementById("remainingCount");
					this.remainingSetsSpan =
						document.getElementById("remainingSetsCount");
					this.resultCard = document.getElementById("resultCard");
					this.drawCountInput = document.getElementById("drawCount");
					this.editModal = document.getElementById("editModal");
					this.editExercisesTA = document.getElementById("editExercises");
					this.editSetsTA = document.getElementById("editSets");
					this.editPosesTA = document.getElementById("editPoses");

					// 이벤트 리스너 연결
					document
						.getElementById("btnPickOne")
						.addEventListener("click", function () {
							self.handlePickOne();
						});
					document
						.getElementById("btnPickMultiple")
						.addEventListener("click", function () {
							self.handlePickMultiple();
						});
					document
						.getElementById("btnPickMultipleSet")
						.addEventListener("click", function () {
							self.handlePickMultipleWithSet();
						});
					document
						.getElementById("btnPickMultipleSetPose")
						.addEventListener("click", function () {
							self.handlePickMultipleWithSetAndPose();
						});
					document
						.getElementById("btnReset")
						.addEventListener("click", function () {
							self.handleReset();
						});
					document
						.getElementById("btnEditList")
						.addEventListener("click", function () {
							self.openEditModal();
						});
					document
						.getElementById("cancelEdit")
						.addEventListener("click", function () {
							self.closeEditModal();
						});
					document
						.getElementById("saveEdit")
						.addEventListener("click", function () {
							self.saveEditChanges();
						});
					document
						.getElementById("resetExercises")
						.addEventListener("click", function () {
							self.resetExercisesToDefault();
						});
					document
						.getElementById("resetSets")
						.addEventListener("click", function () {
							self.resetSetsToDefault();
						});
					document
						.getElementById("resetPoses")
						.addEventListener("click", function () {
							self.resetPosesToDefault();
						});

					// 모달 바깥 클릭 시 닫기
					this.editModal.addEventListener("click", function (e) {
						if (e.target === self.editModal) self.closeEditModal();
					});
				};

				// --- 뽑기 개수를 입력 필드에서 직접 읽어오는 메서드 ---
				RandomBodybuildingApp.prototype.getDrawCount = function () {
					var val = parseInt(this.drawCountInput.value, 10);
					return isNaN(val) || val < 1 ? 1 : val;
				};

				// --- 핸들러 메서드 ---
				RandomBodybuildingApp.prototype.handlePickOne = function () {
					var exercise = this.exercisePool.drawOne();
					if (!exercise) {
						alert(
							"더 이상 뽑을 운동 종목이 없습니다. 초기화하거나 목록을 편집해 주세요.",
						);
						return;
					}
					this.displayResult({ exercises: [exercise], set: null, pose: null });
					this.updateRemainingDisplay();
				};

				RandomBodybuildingApp.prototype.handlePickMultiple = function () {
					var count = this.getDrawCount();
					if (this.exercisePool.getRemainingCount() < count) {
						alert(
							"남은 종목이 " +
								this.exercisePool.getRemainingCount() +
								"개뿐입니다. 개수를 줄이거나 초기화해 주세요.",
						);
						return;
					}
					var exercises = this.exercisePool.drawMultiple(count);
					if (exercises.length === 0) {
						alert("뽑을 수 있는 운동이 없습니다.");
						return;
					}
					this.displayResult({ exercises: exercises, set: null, pose: null });
					this.updateRemainingDisplay();
				};

				RandomBodybuildingApp.prototype.handlePickMultipleWithSet =
					function () {
						// 세트 중복 방지: 세트 잔여량 먼저 확인
						if (this.setPool.getRemainingCount() === 0) {
							alert(
								"더 이상 뽑을 세트가 없습니다. 초기화하거나 목록을 편집해 주세요.",
							);
							return;
						}
						var count = this.getDrawCount();
						if (this.exercisePool.getRemainingCount() < count) {
							alert(
								"남은 종목이 " +
									this.exercisePool.getRemainingCount() +
									"개뿐입니다. 개수를 줄이거나 초기화해 주세요.",
							);
							return;
						}
						var exercises = this.exercisePool.drawMultiple(count);
						var set = this.setPool.drawRandom();
						this.displayResult({ exercises: exercises, set: set, pose: null });
						this.updateRemainingDisplay();
					};

				RandomBodybuildingApp.prototype.handlePickMultipleWithSetAndPose =
					function () {
						if (this.setPool.getRemainingCount() === 0) {
							alert(
								"더 이상 뽑을 세트가 없습니다. 초기화하거나 목록을 편집해 주세요.",
							);
							return;
						}
						var count = this.getDrawCount();
						if (this.exercisePool.getRemainingCount() < count) {
							alert(
								"남은 종목이 " +
									this.exercisePool.getRemainingCount() +
									"개뿐입니다. 개수를 줄이거나 초기화해 주세요.",
							);
							return;
						}
						var exercises = this.exercisePool.drawMultiple(count);
						var set = this.setPool.drawRandom();
						var pose = this.posePool.drawRandom();
						this.displayResult({ exercises: exercises, set: set, pose: pose });
						this.updateRemainingDisplay();
					};

				RandomBodybuildingApp.prototype.handleReset = function () {
					this.exercisePool.resetPicked();
					this.setPool.resetPicked();
					this.updateRemainingDisplay();
					this.resultCard.classList.remove("visible");
					this.resultCard.innerHTML = "";
					console.log("초기화 완료 (운동, 세트)");
				};

				// --- 결과 표시 ---
				RandomBodybuildingApp.prototype.displayResult = function (result) {
					var exercises = result.exercises;
					var set = result.set;
					var pose = result.pose;
					this.resultCard.classList.add("visible");
					var html = "";

					if (exercises && exercises.length > 0) {
						html +=
							'<div class="result-section">' +
							'<div class="result-label">🏋️ 운동 종목</div>' +
							'<ul class="exercise-list">';
						exercises.forEach(function (ex) {
							html += "<li>✅ " + escapeHTML(ex) + "</li>";
						});
						html += "</ul></div>";
					}

					if (set) {
						html +=
							'<div class="result-section">' +
							'<div class="result-label">🔄 세트</div>' +
							'<div class="set-pose-item">📌 ' +
							escapeHTML(set) +
							"</div>" +
							"</div>";
					}

					if (pose) {
						html +=
							'<div class="result-section">' +
							'<div class="result-label">📷 포징 모음</div>' +
							'<div class="set-pose-item">🤸 ' +
							escapeHTML(pose) +
							"</div>" +
							"</div>";
					}

					this.resultCard.innerHTML = html;
					console.log("결과 표시:", result);
				};

				RandomBodybuildingApp.prototype.updateRemainingDisplay = function () {
					var remainingEx = this.exercisePool.getRemainingCount();
					var remainingSet = this.setPool.getRemainingCount();
					this.remainingSpan.textContent = remainingEx;
					this.remainingSetsSpan.textContent = remainingSet;
					console.log(
						"남은 종목: " + remainingEx + ", 남은 세트: " + remainingSet,
					);
				};

				// --- 편집 모달 ---
				RandomBodybuildingApp.prototype.openEditModal = function () {
					this.editExercisesTA.value = this.exercisePool.items.join("\n");
					this.editSetsTA.value = this.setPool.items.join("\n");
					this.editPosesTA.value = this.posePool.items.join("\n");
					this.editModal.style.display = "flex";
					console.log("편집 모달 열기");
				};

				RandomBodybuildingApp.prototype.closeEditModal = function () {
					this.editModal.style.display = "none";
					console.log("편집 모달 닫기");
				};

				RandomBodybuildingApp.prototype.saveEditChanges = function () {
					var exLines = this.editExercisesTA.value
						.split("\n")
						.map(function (line) {
							return line.trim();
						})
						.filter(function (line) {
							return line.length > 0;
						});
					var setLines = this.editSetsTA.value
						.split("\n")
						.map(function (line) {
							return line.trim();
						})
						.filter(function (line) {
							return line.length > 0;
						});
					var poseLines = this.editPosesTA.value
						.split("\n")
						.map(function (line) {
							return line.trim();
						})
						.filter(function (line) {
							return line.length > 0;
						});

					if (exLines.length === 0) {
						alert("운동 종목을 하나 이상 입력해야 합니다.");
						return;
					}

					this.exercisePool.setItems(exLines);
					this.setPool.setItems(setLines);
					this.posePool.setItems(poseLines);

					this.updateRemainingDisplay();
					this.resultCard.classList.remove("visible");
					this.resultCard.innerHTML = "";
					this.closeEditModal();
					console.log("목록 편집 저장 완료");
				};

				RandomBodybuildingApp.prototype.resetExercisesToDefault = function () {
					this.editExercisesTA.value = DEFAULT_EXERCISES.join("\n");
					console.log("운동 기본값 복원");
				};

				RandomBodybuildingApp.prototype.resetSetsToDefault = function () {
					this.editSetsTA.value = DEFAULT_SETS.join("\n");
					console.log("세트 기본값 복원");
				};

				RandomBodybuildingApp.prototype.resetPosesToDefault = function () {
					this.editPosesTA.value = DEFAULT_POSES.join("\n");
					console.log("포징 기본값 복원");
				};

				// ---------- 앱 시작 ----------
				var app = new RandomBodybuildingApp();
				// 테스트 용이성을 위해 전역 노출 (개발자 도구에서 접근 가능)
				window.__app = app;
			})();
		</script>
	</body>
</html>
