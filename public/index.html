<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"

		<title>랜덤 보디빌딩</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family:
					"Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
				background: #f0f4f1;
				/* 녹색 계열 배경 */
				display: flex;
				justify-content: center;
				align-items: flex-start;
				min-height: 100vh;
				padding: 1.2rem 1rem 2rem;
				margin: 0;
			}

			.container {
				width: 100%;
				max-width: 520px;
				background: white;
				border-radius: 2rem;
				box-shadow: 0 12px 30px rgba(0, 80, 20, 0.12);

				flex-direction: column;
				gap: 1.6rem;
			}

			h1 {
				font-size: 1.9rem;
				font-weight: 700;
				color: #1b5e20;
				text-align: center;
				letter-spacing: -0.5px;
				margin-bottom: 0.2rem;
			}

			.remaining-badge {
				background: #e8f5e9;
				color: #2e7d32;
				padding: 0.5rem 1.2rem;
				border-radius: 3rem;
				font-weight: 600;
				font-size: 0.95rem;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.4rem;
				align-self: center;
				box-shadow: 0 2px 8px rgba(0, 100, 0, 0.1);
			}

			.count-input-area {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				flex-wrap: wrap;
			}

			.count-input-area label {
				font-weight: 600;
				color: #1b5e20;
				font-size: 1rem;
			}

			#drawCount {
				width: 4rem;
				padding: 0.55rem 0.4rem;
				border: 2px solid #a5d6a7;
				border-radius: 1rem;
				text-align: center;
				font-size: 1rem;
				font-weight: 600;
				color: #1b5e20;
				background: white;
			}

			.button-grid {
				display: flex;
				flex-direction: column;
				gap: 0.75rem;
			}

			.button-row {
				display: flex;
				flex-wrap: wrap;
				gap: 0.6rem;
				justify-content: center;
			}

			button {
				background: #e8f5e9;
				border: none;
				padding: 0.9rem 1.2rem;
				border-radius: 2rem;
				font-weight: 600;
				font-size: 0.95rem;
				color: #1b5e20;
				background: #ffffff;
				box-shadow: 0 4px 12px rgba(46, 125, 50, 0.15);
				border: 1px solid #c8e6c9;
				transition: all 0.2s ease;
				cursor: pointer;
				flex: 1 1 auto;
				min-width: 130px;
				letter-spacing: -0.3px;
				white-space: nowrap;
			}

			button:active {
				background: #c8e6c9;
				box-shadow: 0 2px 6px rgba(0, 80, 20, 0.2);
				transform: scale(0.97);
			}

			button.primary {
				background: #2e7d32;
				color: white;
				border: 1px solid #1b5e20;
				box-shadow: 0 6px 14px rgba(27, 94, 32, 0.3);
				font-weight: 700;
			}

			button.primary:active {
				background: #1b5e20;
			}

			.result-card {
				background: #f1f8e9;
				border-radius: 1.8rem;
				padding: 1.6rem 1.4rem;
				box-shadow: 0 8px 24px rgba(0, 80, 20, 0.1);
				border: 1px solid #c8e6c9;
				display: none;
				flex-direction: column;
				gap: 1rem;
			}

			.result-card.visible {
				display: flex;
			}

			.result-section {
				background: white;
				border-radius: 1.2rem;
				padding: 1rem 1.2rem;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
			}

			.result-label {
				font-size: 0.85rem;
				font-weight: 700;
				color: #2e7d32;
				margin-bottom: 0.5rem;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}

			.exercise-list {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			.exercise-list li {
				font-weight: 600;
				font-size: 1.1rem;
				color: #1b1b1b;
				background: #f5f5f5;
				padding: 0.7rem 1rem;
				border-radius: 1rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
				border-left: 5px solid #4caf50;
			}

			.set-pose-item {
				font-weight: 700;
				font-size: 1.2rem;
				color: #1b5e20;
				background: #e8f5e9;
				padding: 0.8rem 1.2rem;
				border-radius: 1rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}

			.modal-overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 30, 10, 0.6);
				backdrop-filter: blur(4px);
				display: none;
				justify-content: center;
				align-items: center;
				z-index: 1000;
				padding: 1rem;
			}

			.modal {
				background: white;
				border-radius: 2rem;
				max-width: 550px;
				width: 100%;
				max-height: 85vh;
				overflow-y: auto;
				padding: 1.8rem 1.5rem;
				box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
				display: flex;
				flex-direction: column;
				gap: 1.4rem;
			}

			.modal h2 {
				color: #1b5e20;
				text-align: center;
				font-size: 1.5rem;
			}

			.edit-section {
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			.edit-section label {
				font-weight: 700;
				color: #2e7d32;
				font-size: 0.9rem;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.edit-section textarea {
				width: 100%;
				height: 120px;
				border: 2px solid #a5d6a7;
				border-radius: 1rem;
				padding: 0.8rem;
				font-size: 0.9rem;
				font-family: inherit;
				resize: vertical;
				background: #f9fdf9;
			}

			.modal-actions {
				display: flex;
				gap: 0.8rem;
				justify-content: flex-end;
				flex-wrap: wrap;
			}

			.reset-small {
				background: none;
				border: 1px solid #a5d6a7;
				color: #2e7d32;
				padding: 0.3rem 0.9rem;
				font-size: 0.8rem;
				border-radius: 1.5rem;
				font-weight: 600;
				box-shadow: none;
				min-width: auto;
			}

			@media (max-width: 400px) {
				.container {
					padding: 1.4rem 1rem;
				}

				button {
					padding: 0.8rem 1rem;
					font-size: 0.85rem;
					min-width: 100px;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>💚 랜덤 보디빌딩</h1>

			<div class="remaining-badge" id="remainingDisplay">
				<span>🏋️ 남은 종목</span> <span id="remainingCount">0</span>
			</div>

			<div class="count-input-area">
				<label for="drawCount">뽑을 개수</label>
				<input
					type="number"
					id="drawCount"
					value="3"
					min="1"
					max="60"
					step="1"
				/>
			</div>

			<div class="button-grid">
				<div class="button-row">
					<button id="btnPickOne">🎯 종목 하나 뽑기</button>
					<button id="btnPickMultiple">📋 종목 여럿 뽑기</button>
				</div>
				<div class="button-row">
					<button id="btnPickMultipleSet">📋➕세트</button>
					<button id="btnPickMultipleSetPose">📋➕세트➕포즈</button>
				</div>
				<div class="button-row">
					<button id="btnReset" class="primary">🔄 초기화</button>
					<button id="btnEditList">✏️ 목록 편집</button>
				</div>
			</div>

			<!-- 결과 카드 -->
			<div id="resultCard" class="result-card">
				<!-- 동적으로 채워짐 -->
			</div>
		</div>

		<!-- 편집 모달 -->
		<div id="editModal" class="modal-overlay">
			<div class="modal">
				<h2>📝 목록 편집</h2>
				<div class="edit-section">
					<label
						>저항운동 종목
						<button class="reset-small" id="resetExercises">
							기본값 복원
						</button></label
					>
					<textarea
						id="editExercises"
						placeholder="한 줄에 하나씩 입력"
					></textarea>
				</div>
				<div class="edit-section">
					<label
						>세트 목록
						<button class="reset-small" id="resetSets">
							기본값 복원
						</button></label
					>
					<textarea id="editSets" placeholder="한 줄에 하나씩 입력"></textarea>
				</div>
				<div class="edit-section">
					<label
						>포즈 모음 목록
						<button class="reset-small" id="resetPoses">
							기본값 복원
						</button></label
					>
					<textarea id="editPoses" placeholder="한 줄에 하나씩 입력"></textarea>
				</div>
				<div class="modal-actions">
					<button id="cancelEdit">취소</button>
					<button id="saveEdit" class="primary">저장</button>
				</div>
			</div>
		</div>

		<script>
			(function () {
				// ---------- 기본 데이터 (하드코딩 없이 상수로 분리) ----------
				const DEFAULT_EXERCISES = [
					"플랫 바벨 벤치 프레스",
					"인클라인 바벨 벤치프레스",
					"플랫 덤벨 벤치 프레스",
					"인클라인 덤벨 벤치 프레스",
					"플랫 덤벨 플라이",
					"플랫 덤벨 풀오버",
					"스탠딩 바벨 컬",

					"스탠딩 덤벨 컬",

					"스탠딩 원암 덤벨 오버헤드 트라이셉스 익스텐션",
					"라잉 바벨 트라이셉스 익스텐션",

					"벤치 딥스",
					"바벨 리스트 컬",
					"바벨 리버스 리스트 컬",
					"덤벨 리스트 컬",
					"덤벨 리버스 리스트 컬",
					"컨벤셔널 데드리프트",
					"루마니안 데드리프트",
					"벤트오버 바벨 로우",
					"언더그립 바벨 로우",
					"뉴트럴그립 투암 덤벨 로우",
					"벤트오버 원암 덤벨 로우",
					"바벨 쉬러그",
					"덤벨 쉬러그",
					"바벨 굿모닝 엑서사이즈",
					"스탠딩 밀리터리 프레스 (바벨 오버헤드 프레스)",
					"스탠딩 비하인드 넥 프레스",
					"스탠딩 덤벨 숄더 프레스",
					"스탠딩 바벨 프런트 레이즈",
					"스탠딩 덤벨 프런트 레이즈",
					"덤벨 벤트오버 레터럴 레이즈",
					"바벨 업라이트 로우",
					"크런치",
					"레그 레이즈",
					"싯업",
					"시티드 니업",
					"리버스 크런치",
					"덤벨 사이드 밴드",
					"바벨 백 스쿼트",
					"바벨 프런트 스쿼트",
					"고블릿 스쿼트",
					"덤벨 불가리안 스플릿 스쿼트",
					"스티프 레그 데드리프트",
					"바벨 런지",
					"덤벨 런지",
				];

				const DEFAULT_SETS = [
					"하체 트라이세트",
					"삼두 트라이세트",
					"이두 트라이세트",
					"어깨 트라이세트",
					"등 트라이세트",
					"가슴 트라이세트",
					"전완 트라이세트",
					"복부 트라이세트",
					"하체 컴파운드세트",
					"삼두 컴파운드세트",
					"이두 컴파운드세트",
					"어깨 컴파운드세트",
					"등 컴파운드세트",
					"가슴 컴파운드세트",
					"전완 컴파운드세트",
					"복부 컴파운드세트",
					"이두·삼두 슈퍼세트",
				];

				const DEFAULT_POSES = [
					"보디빌딩 규정포즈 7개",
					"클래식 보디빌딩 규정포즈 7개",
					"남자 피지크 쿼터턴",
					"여자 피지크 규정포즈 4개",
					"여자 피지크 쿼터턴",
					"여자 보디피트니스",
					"여자 비키니",
				];

				// ---------- 유틸리티 함수 ----------
				const shuffleArray = (arr) => {
					for (let i = arr.length - 1; i > 0; i--) {
						const j = Math.floor(Math.random() * (i + 1));
						[arr[i], arr[j]] = [arr[j], arr[i]];
					}
					return arr;
				};

				// ---------- 풀(Pool) 관리 클래스 ----------
				class ExercisePool {
					constructor(items = []) {
						this.items = [...items];
						this.picked = new Set();
					}

					resetPicked() {
						this.picked.clear();
						console.log("운동 종목 선택 기록 초기화");
					}

					setItems(newItems) {
						this.items = [...newItems];
						this.picked.clear(); // 풀이 바뀌면 선택 기록도 초기화
						console.log("운동 풀 업데이트, 개수:", this.items.length);
					}

					getRemainingCount() {
						return this.items.length - this.picked.size;
					}

					getAvailableItems() {
						return this.items.filter((item) => !this.picked.has(item));
					}

					drawOne() {
						const available = this.getAvailableItems();
						if (available.length === 0) return null;
						const randomIndex = Math.floor(Math.random() * available.length);
						const chosen = available[randomIndex];
						this.picked.add(chosen);
						console.log("운동 1개 뽑음:", chosen);
						return chosen;
					}

					drawMultiple(count) {
						const available = this.getAvailableItems();
						if (available.length === 0) return [];
						const shuffled = shuffleArray([...available]);
						const toPick = Math.min(count, shuffled.length);
						const chosen = shuffled.slice(0, toPick);
						chosen.forEach((item) => this.picked.add(item));
						console.log(`운동 ${toPick}개 뽑음:`, chosen);
						return chosen;
					}
				}

				class SetPool {
					constructor(items = []) {
						this.items = [...items];
					}

					setItems(newItems) {
						this.items = [...newItems];
						console.log("세트 풀 업데이트:", this.items.length);
					}

					drawRandom() {
						if (this.items.length === 0) return null;
						const idx = Math.floor(Math.random() * this.items.length);
						return this.items[idx];
					}
				}

				class PosePool {
					constructor(items = []) {
						this.items = [...items];
					}

					setItems(newItems) {
						this.items = [...newItems];
						console.log("포즈 풀 업데이트:", this.items.length);
					}

					drawRandom() {
						if (this.items.length === 0) return null;
						const idx = Math.floor(Math.random() * this.items.length);
						return this.items[idx];
					}
				}

				// ---------- 메인 앱 클래스 (UI와 로직 분리) ----------
				class RandomBodybuildingApp {
					constructor() {
						this.exercisePool = new ExercisePool(DEFAULT_EXERCISES);
						this.setPool = new SetPool(DEFAULT_SETS);
						this.posePool = new PosePool(DEFAULT_POSES);
						this.drawCount = 3;
						this.initUI();
						this.updateRemainingDisplay();
						console.log("앱 초기화 완료");
					}

					initUI() {
						// DOM 요소 캐싱
						this.remainingSpan = document.getElementById("remainingCount");
						this.resultCard = document.getElementById("resultCard");
						this.drawCountInput = document.getElementById("drawCount");
						this.editModal = document.getElementById("editModal");
						this.editExercisesTA = document.getElementById("editExercises");
						this.editSetsTA = document.getElementById("editSets");
						this.editPosesTA = document.getElementById("editPoses");

						// 이벤트 리스너 연결
						document
							.getElementById("btnPickOne")
							.addEventListener("click", () => this.handlePickOne());
						document
							.getElementById("btnPickMultiple")
							.addEventListener("click", () => this.handlePickMultiple());
						document
							.getElementById("btnPickMultipleSet")
							.addEventListener("click", () =>
								this.handlePickMultipleWithSet(),
							);
						document
							.getElementById("btnPickMultipleSetPose")
							.addEventListener("click", () =>
								this.handlePickMultipleWithSetAndPose(),
							);
						document
							.getElementById("btnReset")
							.addEventListener("click", () => this.handleReset());
						document
							.getElementById("btnEditList")
							.addEventListener("click", () => this.openEditModal());
						document
							.getElementById("cancelEdit")
							.addEventListener("click", () => this.closeEditModal());
						document
							.getElementById("saveEdit")
							.addEventListener("click", () => this.saveEditChanges());
						document
							.getElementById("resetExercises")
							.addEventListener("click", () => this.resetExercisesToDefault());
						document
							.getElementById("resetSets")
							.addEventListener("click", () => this.resetSetsToDefault());
						document
							.getElementById("resetPoses")
							.addEventListener("click", () => this.resetPosesToDefault());
						this.drawCountInput.addEventListener("change", (e) => {
							const val = parseInt(e.target.value, 10);
							if (!isNaN(val) && val >= 1) {
								this.drawCount = val;
								console.log("뽑기 개수 변경:", this.drawCount);
							} else {
								this.drawCountInput.value = this.drawCount;
							}
						});

						// 모달 바깥 클릭 시 닫기
						this.editModal.addEventListener("click", (e) => {
							if (e.target === this.editModal) this.closeEditModal();
						});
					}

					// --- 핸들러 메서드 ---
					handlePickOne() {
						const exercise = this.exercisePool.drawOne();
						if (!exercise) {
							alert(
								"더 이상 뽑을 운동 종목이 없습니다. 초기화하거나 목록을 편집해 주세요.",
							);
							return;
						}
						this.displayResult({
							exercises: [exercise],
							set: null,
							pose: null,
						});
						this.updateRemainingDisplay();
					}

					handlePickMultiple() {
						const count = this.drawCount;
						if (this.exercisePool.getRemainingCount() < count) {
							alert(
								`남은 종목이 ${this.exercisePool.getRemainingCount()}개뿐입니다. 개수를 줄이거나 초기화해 주세요.`,
							);
							return;
						}
						const exercises = this.exercisePool.drawMultiple(count);
						if (exercises.length === 0) {
							alert("뽑을 수 있는 운동이 없습니다.");
							return;
						}
						this.displayResult({ exercises, set: null, pose: null });
						this.updateRemainingDisplay();
					}

					handlePickMultipleWithSet() {
						const count = this.drawCount;
						if (this.exercisePool.getRemainingCount() < count) {
							alert(
								`남은 종목이 ${this.exercisePool.getRemainingCount()}개뿐입니다. 개수를 줄이거나 초기화해 주세요.`,
							);
							return;
						}
						const exercises = this.exercisePool.drawMultiple(count);
						const set = this.setPool.drawRandom();
						this.displayResult({ exercises, set, pose: null });
						this.updateRemainingDisplay();
					}

					handlePickMultipleWithSetAndPose() {
						const count = this.drawCount;
						if (this.exercisePool.getRemainingCount() < count) {
							alert(
								`남은 종목이 ${this.exercisePool.getRemainingCount()}개뿐입니다. 개수를 줄이거나 초기화해 주세요.`,
							);
							return;
						}
						const exercises = this.exercisePool.drawMultiple(count);
						const set = this.setPool.drawRandom();
						const pose = this.posePool.drawRandom();
						this.displayResult({ exercises, set, pose });
						this.updateRemainingDisplay();
					}

					handleReset() {
						this.exercisePool.resetPicked();
						this.updateRemainingDisplay();
						this.resultCard.classList.remove("visible");
						this.resultCard.innerHTML = "";
						console.log("초기화 완료");
					}

					// --- 결과 표시 ---
					displayResult({ exercises, set, pose }) {
						this.resultCard.classList.add("visible");
						let html = "";

						if (exercises && exercises.length > 0) {
							html += `<div class="result-section">
              <div class="result-label">🏋️ 운동 종목</div>
              <ul class="exercise-list">`;
							exercises.forEach((ex) => {
								html += `<li>✅ ${escapeHTML(ex)}</li>`;
							});
							html += `</ul></div>`;
						}

						if (set) {
							html += `<div class="result-section">
              <div class="result-label">🔄 세트</div>
              <div class="set-pose-item">📌 ${escapeHTML(set)}</div>
            </div>`;
						}

						if (pose) {
							html += `<div class="result-section">
              <div class="result-label">📷 포즈 모음</div>
              <div class="set-pose-item">🤸 ${escapeHTML(pose)}</div>
            </div>`;
						}

						this.resultCard.innerHTML = html;
						console.log("결과 표시:", { exercises, set, pose });
					}

					updateRemainingDisplay() {
						const remaining = this.exercisePool.getRemainingCount();
						this.remainingSpan.textContent = remaining;
						console.log("남은 종목:", remaining);
					}

					// --- 편집 모달 ---
					openEditModal() {
						this.editExercisesTA.value = this.exercisePool.items.join("\n");
						this.editSetsTA.value = this.setPool.items.join("\n");
						this.editPosesTA.value = this.posePool.items.join("\n");
						this.editModal.style.display = "flex";
						console.log("편집 모달 열기");
					}

					closeEditModal() {
						this.editModal.style.display = "none";
						console.log("편집 모달 닫기");
					}

					saveEditChanges() {
						const exLines = this.editExercisesTA.value
							.split("\n")
							.map((line) => line.trim())
							.filter((line) => line.length > 0);
						const setLines = this.editSetsTA.value
							.split("\n")
							.map((line) => line.trim())
							.filter((line) => line.length > 0);
						const poseLines = this.editPosesTA.value
							.split("\n")
							.map((line) => line.trim())
							.filter((line) => line.length > 0);

						if (exLines.length === 0) {
							alert("운동 종목을 하나 이상 입력해야 합니다.");
							return;
						}

						this.exercisePool.setItems(exLines);
						this.setPool.setItems(setLines);
						this.posePool.setItems(poseLines);

						this.updateRemainingDisplay();
						this.resultCard.classList.remove("visible");
						this.resultCard.innerHTML = "";
						this.closeEditModal();
						console.log("목록 편집 저장 완료");
					}

					resetExercisesToDefault() {
						this.editExercisesTA.value = DEFAULT_EXERCISES.join("\n");
						console.log("운동 기본값 복원");
					}

					resetSetsToDefault() {
						this.editSetsTA.value = DEFAULT_SETS.join("\n");
						console.log("세트 기본값 복원");
					}

					resetPosesToDefault() {
						this.editPosesTA.value = DEFAULT_POSES.join("\n");
						console.log("포즈 기본값 복원");
					}
				}

				// HTML 이스케이프 헬퍼
				function escapeHTML(str) {
					return String(str)
						.replace(/&/g, "&amp;")
						.replace(/</g, "&lt;")
						.replace(/>/g, "&gt;")
						.replace(/"/g, "&quot;")
						.replace(/'/g, "&#039;");
				}

				// ---------- 앱 시작 ----------
				const app = new RandomBodybuildingApp();
				// 테스트 용이성을 위해 전역 노출 (개발자 도구에서 접근 가능)
				window.__app = app;
			})();
		</script>
	</body>
</html>
